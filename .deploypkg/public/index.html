<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patch Scheduler Helper</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; max-width: 1000px; }
      .row { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; }
      .card { border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin: 8px 0; }
      .enabled { border-left: 6px solid #11823b; }
      .disabled { border-left: 6px solid #b42318; opacity: 0.75; }
      textarea { width: 100%; min-height: 260px; }
      input, select { padding: 6px; }
    </style>
  </head>
  <body>
    <h1>Patch Scheduler Helper</h1>
    <p>Starter UI: only Update Manager-enabled servers are highlighted; "Show enabled only" defaults on.</p>
    <p id="modeBanner"></p>
    <div class="row">
      <a href="/.auth/login/aad">Sign in with Entra</a>
      <a href="/.auth/logout">Sign out</a>
    </div>

    <div class="row">
      <label><input id="enabledOnly" type="checkbox" checked /> Show enabled only</label>
      <button id="refresh">Refresh servers</button>
    </div>
    <div id="servers"></div>

    <h2>Maintenance Configuration</h2>
    <div class="row"><label>Name <input id="name" value="generated-mc" /></label></div>
    <div class="row"><label>Resource Group <input id="rg" value="rg-maintenance" /></label></div>
    <div class="row"><label>Location <input id="location" value="westeurope" /></label></div>
    <div class="row"><label>Patch Mode
      <select id="patchMode"><option>Platform</option><option>User</option></select>
    </label></div>
    <div class="row"><label>Start DateTime <input id="startDateTime" value="2026-03-01 22:00" /></label></div>
    <div class="row"><label>Time Zone <input id="timeZone" value="UTC" /></label></div>
    <div class="row"><label>Recur Every <input id="recurEvery" value="1Week" /></label></div>
    <div class="row"><label>Duration <input id="duration" value="03:00" /></label></div>
    <div class="row"><label>Reboot
      <select id="reboot"><option>IfRequired</option><option>Always</option><option>Never</option></select>
    </label></div>
    <div class="row">
      <button id="generate">Generate Terraform</button>
    </div>
    <textarea id="terraform" readonly></textarea>

    <script>
      async function loadConfig() {
        const resp = await fetch("/api/config");
        const data = await resp.json();
        const banner = document.getElementById("modeBanner");
        if (data.demoMode) {
          banner.textContent = "Demo mode is ON: no Entra login required.";
          banner.style.color = "#b54708";
        } else if (data.user && data.user.name) {
          banner.textContent = `Signed in as ${data.user.name}`;
          banner.style.color = "#027a48";
        } else {
          banner.textContent = "Sign in required.";
          banner.style.color = "#b42318";
        }
      }

      async function loadServers() {
        const enabledOnly = document.getElementById("enabledOnly").checked;
        const resp = await fetch(`/api/servers?showEnabledOnly=${enabledOnly}`);
        if (!resp.ok) {
          document.getElementById("servers").innerHTML = `<div class="card disabled">Unable to load servers: ${resp.status}</div>`;
          return;
        }
        const data = await resp.json();
        const container = document.getElementById("servers");
        container.innerHTML = "";
        for (const server of data.servers) {
          const el = document.createElement("div");
          el.className = `card ${server.isUpdateManagerEnabled ? "enabled" : "disabled"}`;
          el.innerHTML = `<strong>${server.name}</strong> (${server.osType}) - ${server.resourceGroup}
            <div>${server.isUpdateManagerEnabled ? "Update Manager enabled" : "Not enabled"}</div>`;
          container.appendChild(el);
        }
      }

      async function generateTerraform() {
        const payload = {
          name: document.getElementById("name").value,
          resourceGroupName: document.getElementById("rg").value,
          location: document.getElementById("location").value,
          inGuestUserPatchMode: document.getElementById("patchMode").value,
          startDateTime: document.getElementById("startDateTime").value,
          timeZone: document.getElementById("timeZone").value,
          recurEvery: document.getElementById("recurEvery").value,
          duration: document.getElementById("duration").value,
          reboot: document.getElementById("reboot").value
        };
        const resp = await fetch("/api/terraform", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (!resp.ok) {
          document.getElementById("terraform").value = `Unable to generate Terraform: ${resp.status}`;
          return;
        }
        const data = await resp.json();
        document.getElementById("terraform").value = data.terraform;
      }

      document.getElementById("refresh").addEventListener("click", loadServers);
      document.getElementById("enabledOnly").addEventListener("change", loadServers);
      document.getElementById("generate").addEventListener("click", generateTerraform);
      loadConfig();
      loadServers();
    </script>
  </body>
</html>
